<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Daily Plan"/>
  <title>Daily Plan</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;1,9..144,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --cream:#FAF7F2; --ink:#1C1A17; --ink-soft:#3D3A34; --muted:#8C8880;
      --border:#E5DFD5; --gold:#C8973A; --rose:#C4736A; --sage:#6A9E7E;
      --blue:#5B7FA6; --lav:#8B7BB5;
      --shadow:0 2px 12px rgba(28,26,23,.07),0 1px 3px rgba(28,26,23,.04);
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;padding-bottom:calc(env(safe-area-inset-bottom,0px)+40px);-webkit-font-smoothing:antialiased;overflow-x:hidden;}

    /* HEADER */
    .header{background:var(--ink);color:var(--cream);padding:calc(env(safe-area-inset-top,0px)+36px) 20px 20px;position:relative;overflow:hidden;}
    .header::before{content:'';position:absolute;top:-50px;right:-30px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(200,151,58,.15) 0%,transparent 70%);pointer-events:none;}
    .eyebrow{font-size:10.5px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-bottom:4px;}
    .h-title{font-family:'Fraunces',serif;font-size:28px;font-weight:500;line-height:1.1;letter-spacing:-.02em;margin-bottom:3px;}
    .h-sub{font-size:12px;color:rgba(250,247,242,.4);font-weight:300;margin-bottom:3px;}
    .h-sub-note{font-size:10px;color:rgba(250,247,242,.22);font-style:italic;margin-bottom:14px;}
    .prog-wrap{background:rgba(255,255,255,.08);border-radius:100px;height:4px;overflow:hidden;margin-bottom:6px;}
    .prog-fill{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--gold),var(--rose));transition:width .5s cubic-bezier(.34,1.56,.64,1);}
    .prog-lbl{font-size:10px;color:rgba(250,247,242,.3);font-weight:300;}
    .header-controls{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
    .hc-btn{padding:6px 12px;border-radius:100px;font-size:11px;font-weight:500;cursor:pointer;border:1.5px solid rgba(255,255,255,.15);color:rgba(250,247,242,.6);background:transparent;font-family:'DM Sans',sans-serif;transition:all .18s ease;white-space:nowrap;user-select:none;}
    .hc-btn.active{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.3);color:var(--cream);}
    .hc-btn.focus-active{background:var(--rose);border-color:var(--rose);color:white;}
    .hc-btn.streak{color:var(--gold);border-color:rgba(200,151,58,.35);}

    /* TABS */
    .tabs-wrap{background:var(--ink);padding:0 20px 16px;overflow-x:auto;scrollbar-width:none;}
    .tabs-wrap::-webkit-scrollbar{display:none;}
    .tabs{display:flex;gap:6px;width:max-content;}
    .tab{padding:7px 14px;border-radius:100px;font-size:12px;font-weight:500;cursor:pointer;transition:all .18s ease;white-space:nowrap;border:1.5px solid rgba(255,255,255,.12);color:rgba(250,247,242,.5);background:transparent;user-select:none;}
    .tab.active{background:var(--gold);border-color:var(--gold);color:var(--ink);font-weight:600;}
    .tab.today-tab:not(.active){border-color:rgba(200,151,58,.4);color:rgba(250,247,242,.75);}
    .tab.no-plan{opacity:.45;}
    .tab.next-week-tab:not(.active){border-color:rgba(139,123,181,.35);color:rgba(250,247,242,.55);}
    .tab.next-week-tab.active{background:var(--lav);border-color:var(--lav);color:white;}
    .tab.list-tab:not(.active){border-color:rgba(106,158,126,.35);color:rgba(250,247,242,.55);}
    .tab.list-tab.active{background:var(--sage);border-color:var(--sage);color:white;}

    /* LOADING */
    .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 24px;gap:16px;text-align:center;}
    .spinner{width:32px;height:32px;border:2.5px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-lbl{font-family:'Fraunces',serif;font-size:15px;color:var(--muted);font-style:italic;}
    .error-box{margin:20px 14px;background:rgba(196,115,106,.08);border:1px solid rgba(196,115,106,.25);border-radius:12px;padding:16px;text-align:center;}
    .error-box p{font-size:13px;color:var(--rose);margin-bottom:12px;line-height:1.5;}
    .retry-btn{background:var(--ink);color:var(--cream);border:none;border-radius:100px;padding:10px 24px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;}

    /* DEADLINE */
    .deadline{margin:12px 14px 0;background:rgba(200,151,58,.08);border:1px solid rgba(200,151,58,.22);border-radius:11px;padding:10px 13px;font-size:12.5px;color:var(--ink-soft);line-height:1.45;}
    .deadline strong{color:#9A6C22;font-weight:600;}

    /* LEGEND */
    .legend{display:flex;gap:12px;padding:10px 14px;overflow-x:auto;border-bottom:1px solid var(--border);scrollbar-width:none;}
    .legend::-webkit-scrollbar{display:none;}
    .li{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:500;color:var(--muted);white-space:nowrap;}
    .ld{width:7px;height:7px;border-radius:50%;}

    /* ENERGY FILTER */
    .energy-bar{display:flex;gap:6px;padding:10px 14px;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;}
    .energy-bar::-webkit-scrollbar{display:none;}
    .ef-btn{padding:5px 12px;border-radius:100px;font-size:11px;font-weight:500;cursor:pointer;border:1.5px solid var(--border);color:var(--muted);background:#fff;font-family:'DM Sans',sans-serif;transition:all .16s ease;white-space:nowrap;user-select:none;}
    .ef-btn.active-peak{background:rgba(200,151,58,.1);border-color:var(--gold);color:var(--gold);}
    .ef-btn.active-decent{background:rgba(106,158,126,.1);border-color:var(--sage);color:var(--sage);}
    .ef-btn.active-crash{background:rgba(139,123,181,.1);border-color:var(--lav);color:var(--lav);}
    .ef-btn.active-all{background:rgba(28,26,23,.06);border-color:var(--ink-soft);color:var(--ink-soft);}

    /* NO PLAN */
    .no-plan-msg{padding:48px 24px;text-align:center;}
    .no-plan-msg .emoji{font-size:36px;margin-bottom:12px;}
    .no-plan-msg h3{font-family:'Fraunces',serif;font-size:18px;font-weight:500;margin-bottom:6px;}
    .no-plan-msg p{font-size:13px;color:var(--muted);line-height:1.5;}

    /* SECTION */
    .section{padding:16px 14px 2px;}
    .sec-title{font-size:9.5px;font-weight:500;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);margin-bottom:9px;display:flex;align-items:center;gap:8px;}
    .sec-title::after{content:'';flex:1;height:1px;background:var(--border);}

    /* SWIPEABLE TASK */
    .swipe-wrap{position:relative;margin-bottom:7px;border-radius:12px;overflow:hidden;}
    .swipe-bg-left{position:absolute;inset:0;background:var(--sage);display:flex;align-items:center;padding-left:18px;font-size:13px;font-weight:600;color:white;border-radius:12px;}
    .swipe-bg-right{position:absolute;inset:0;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;gap:6px;border-radius:12px;background:var(--lav);}
    .swipe-action-btn{padding:8px 10px;border-radius:8px;background:rgba(255,255,255,.18);color:white;font-size:11px;font-weight:600;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;}

    .task{background:#fff;border-radius:12px;padding:12px 13px;display:flex;align-items:flex-start;gap:10px;box-shadow:var(--shadow);border-left:3px solid transparent;position:relative;overflow:hidden;animation:up .32s ease both;touch-action:pan-y;will-change:transform;transition:transform .05s linear;}
    .task.peak{border-left-color:var(--gold);}
    .task.decent{border-left-color:var(--sage);}
    .task.crash{border-left-color:var(--lav);}
    .task.fixed{border-left-color:var(--blue);}
    .task.done{opacity:.38;}
    .task.done .t-title{text-decoration:line-through;color:var(--muted);}
    .task.postponed .t-title,.task.tomorrow-state .t-title{color:var(--muted);}
    .task.event{background:#fafafa;opacity:.8;}
    .task.event .t-title{color:var(--ink-soft);}

    /* Focus mode */
    body.focus-mode .swipe-wrap.not-focus{display:none;}
    body.focus-mode .event-wrap{display:none;}
    body.focus-mode .section:not(.has-focus-task) .sec-title{display:none;}
    body.focus-mode .section:not(.has-focus-task){padding:0;}
    body.filter-peak .swipe-wrap:not(.energy-peak):not(.energy-fixed){display:none;}
    body.filter-decent .swipe-wrap:not(.energy-decent):not(.energy-fixed){display:none;}
    body.filter-crash .swipe-wrap:not(.energy-crash):not(.energy-fixed){display:none;}
    body.filter-peak .event-wrap:not(.energy-fixed){display:none;}
    body.filter-decent .event-wrap:not(.energy-fixed){display:none;}
    body.filter-crash .event-wrap:not(.energy-fixed){display:none;}

    .pin-btn{position:absolute;top:8px;right:8px;width:22px;height:22px;border-radius:50%;background:transparent;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;opacity:.25;transition:opacity .15s;}
    .pin-btn.pinned{opacity:1;}

    .chk{width:20px;height:20px;border-radius:50%;border:1.75px solid var(--border);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .17s ease;background:#fff;font-size:11px;color:white;}
    .task.done .chk{background:var(--sage);border-color:var(--sage);}
    .task.postponed .chk{background:var(--lav);border-color:var(--lav);}
    .task.tomorrow-state .chk{background:var(--blue);border-color:var(--blue);}
    .evt-dot{width:20px;height:20px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;}
    .evt-dot::after{content:'';width:6px;height:6px;border-radius:50%;background:var(--border);}

    .t-body{flex:1;min-width:0;}
    .t-time{font-size:9.5px;font-weight:500;letter-spacing:.06em;color:var(--muted);text-transform:uppercase;margin-bottom:2px;}
    .t-title{font-size:14px;font-weight:400;line-height:1.35;color:var(--ink);}
    .t-note{font-size:11px;color:var(--muted);font-style:italic;margin-top:3px;line-height:1.4;}
    .t-first-step{font-size:11.5px;color:var(--gold);margin-top:4px;font-weight:500;}
    .t-first-step::before{content:'▶ Start: ';}
    .t-status{font-size:10px;font-weight:500;margin-top:3px;}
    .t-status.postponed{color:var(--lav);}
    .t-status.tomorrow{color:var(--blue);}
    .badge{font-size:9px;font-weight:600;padding:2px 6px;border-radius:100px;background:rgba(196,115,106,.11);color:var(--rose);flex-shrink:0;margin-top:2px;letter-spacing:.04em;}

    /* NOW PILL */
    .now-pill{display:inline-flex;align-items:center;gap:5px;background:var(--rose);color:white;font-size:9.5px;font-weight:600;letter-spacing:.07em;padding:2px 8px 2px 6px;border-radius:100px;margin-bottom:6px;text-transform:uppercase;}
    .now-dot{width:5px;height:5px;border-radius:50%;background:white;animation:blink 1.4s ease-in-out infinite;}
    @keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.6)}}

    /* FOCUS BANNER */
    .focus-banner{margin:12px 14px 0;background:rgba(196,115,106,.08);border:1px solid rgba(196,115,106,.22);border-radius:11px;padding:10px 14px;display:flex;align-items:center;gap:10px;}
    .focus-banner-text{font-size:12.5px;color:var(--ink-soft);flex:1;line-height:1.4;}
    .focus-banner-text strong{color:var(--rose);font-weight:600;}
    .focus-hint{font-size:10.5px;color:var(--muted);margin-top:2px;}

    /* TRAY */
    .tray-banner{margin:12px 14px 0;background:rgba(91,127,166,.07);border:1px solid rgba(91,127,166,.2);border-radius:11px;padding:11px 14px;}
    .tray-title{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--blue);margin-bottom:8px;}
    .carried-wrap{position:relative;border-radius:12px;overflow:hidden;margin-bottom:6px;}
    .carried-bg-left{position:absolute;inset:0;background:var(--sage);display:flex;align-items:center;padding-left:18px;font-size:13px;font-weight:600;color:white;border-radius:12px;}
    .carried-bg-right{position:absolute;inset:0;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;gap:6px;border-radius:12px;background:var(--lav);}
    .carried-task{background:#fff;border-radius:12px;padding:12px 13px;display:flex;align-items:flex-start;gap:10px;box-shadow:var(--shadow);border-left:3px solid rgba(91,127,166,.5);position:relative;touch-action:pan-y;will-change:transform;transition:transform .05s linear;}
    .carried-task.done{opacity:.38;}
    .carried-task.done .t-title{text-decoration:line-through;color:var(--muted);}
    .carried-task.postponed-s .t-title,.carried-task.tomorrow-s .t-title{color:var(--muted);}
    .carried-chk{width:20px;height:20px;border-radius:50%;border:1.75px solid rgba(91,127,166,.4);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;background:#fff;font-size:11px;color:white;transition:all .17s ease;}
    .carried-task.done .carried-chk{background:var(--sage);border-color:var(--sage);}
    .carried-task.postponed-s .carried-chk{background:var(--lav);border-color:var(--lav);}
    .carried-task.tomorrow-s .carried-chk{background:var(--blue);border-color:var(--blue);}
    .carried-from{font-size:9.5px;color:var(--blue);font-weight:500;margin-bottom:2px;}

    /* ALL DONE BANNER */
    .all-done-banner{margin:12px 14px 0;background:linear-gradient(135deg,rgba(106,158,126,.12),rgba(200,151,58,.08));border:1px solid rgba(106,158,126,.3);border-radius:11px;padding:14px 16px;text-align:center;}
    .all-done-banner .em{font-size:24px;margin-bottom:4px;}
    .all-done-banner h3{font-family:'Fraunces',serif;font-size:15px;font-weight:500;margin-bottom:2px;}
    .all-done-banner p{font-size:11.5px;color:var(--muted);}

    /* UNDO TOAST */
    #toast{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px)+20px);left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--cream);padding:10px 18px;border-radius:100px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:12px;box-shadow:0 4px 20px rgba(0,0,0,.25);opacity:0;transition:all .25s ease;pointer-events:none;z-index:1000;white-space:nowrap;}
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:all;}
    #toast-undo{background:var(--gold);border:none;color:var(--ink);padding:4px 12px;border-radius:100px;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}

    /* ALL TASKS TAB */
    .list-header{padding:12px 14px 4px;font-size:10.5px;color:var(--muted);display:flex;align-items:center;gap:6px;}
    .list-section{padding:14px 14px 2px;}
    .list-sec-title{font-size:9.5px;font-weight:500;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);margin-bottom:9px;display:flex;align-items:center;gap:8px;}
    .list-sec-title::after{content:'';flex:1;height:1px;background:var(--border);}
    .todo-item{background:#fff;border-radius:12px;padding:12px 14px;margin-bottom:6px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow);animation:up .3s ease both;cursor:pointer;user-select:none;transition:opacity .18s;}
    .todo-item.scheduled{opacity:.35;}
    .todo-item.done-todo{opacity:.32;}
    .todo-item.done-todo .todo-title{text-decoration:line-through;color:var(--muted);}
    .todo-chk{width:20px;height:20px;border-radius:50%;border:1.75px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;background:#fff;font-size:11px;color:white;transition:all .17s;}
    .todo-item.done-todo .todo-chk{background:var(--sage);border-color:var(--sage);}
    .todo-item.scheduled .todo-chk{border-color:rgba(91,127,166,.3);}
    .todo-body{flex:1;min-width:0;}
    .todo-title{font-size:13.5px;font-weight:400;color:var(--ink);line-height:1.3;}
    .todo-meta{display:flex;align-items:center;gap:6px;margin-top:3px;flex-wrap:wrap;}
    .todo-cat{font-size:9px;font-weight:600;padding:2px 6px;border-radius:100px;white-space:nowrap;}
    .cat-urgent{background:rgba(196,115,106,.1);color:var(--rose);}
    .cat-work{background:rgba(91,127,166,.1);color:var(--blue);}
    .cat-personal{background:rgba(106,158,126,.1);color:var(--sage);}
    .sched-tag{font-size:9px;font-weight:500;color:var(--blue);display:flex;align-items:center;gap:3px;background:rgba(91,127,166,.08);padding:2px 6px;border-radius:100px;}
    .completed-toggle{margin:8px 14px;display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;padding:10px 14px;background:#fff;border-radius:12px;box-shadow:var(--shadow);}
    .completed-toggle-label{font-size:12px;font-weight:500;color:var(--muted);flex:1;}
    .completed-toggle-count{font-size:11px;color:var(--muted);background:var(--cream);padding:2px 8px;border-radius:100px;}
    .completed-toggle-arrow{font-size:11px;color:var(--muted);transition:transform .2s ease;}
    .completed-toggle-arrow.open{transform:rotate(180deg);}
    .completed-section{padding:0 14px 4px;display:none;}
    .completed-section.open{display:block;}
    .completed-item{background:#fff;border-radius:12px;padding:10px 14px;margin-bottom:6px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow);opacity:.38;cursor:pointer;}
    .completed-item .todo-title{text-decoration:line-through;color:var(--muted);font-size:13px;}
    .completed-chk{width:20px;height:20px;border-radius:50%;background:var(--sage);border:none;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:white;}

    .refresh-btn{display:block;margin:16px auto 0;background:transparent;border:1.5px solid var(--border);color:var(--muted);border-radius:100px;padding:8px 20px;font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;}
    .footer{text-align:center;padding:20px 14px 4px;font-size:10.5px;color:var(--muted);line-height:1.7;}
    #confetti-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;display:none;}
    @keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>
<div id="toast"><span id="toast-msg"></span><button id="toast-undo" onclick="undoLast()">Undo</button></div>
<div id="root"></div>
<script>

// ═══════════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════════
const API = 'https://daily-planner-api-rouge.vercel.app/api/notion';
const CACHE_TTL = 5 * 60 * 1000; // 5 min cache

const ENCOURAGEMENTS = [
  'Nice one 👏','One less thing 🎉','You\'re doing it ✨','Keep going 💪',
  'That\'s the one 🙌','Momentum! 🔥','Look at you go ⚡','Nailed it ✓',
  'Brain: 1, ADHD: 0 🧠','Small wins add up 🌱',
];

// ═══════════════════════════════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════════════════════════════
const KEYS = {
  thisWeekCache: 'pc_thisweek', nextWeekCache: 'pc_nextweek', todosCache: 'pc_todos',
  thisWeekTs: 'pc_thisweek_ts', nextWeekTs: 'pc_nextweek_ts', todosTs: 'pc_todos_ts',
  done: 'pc_done', postponed: 'pc_postponed', tomorrow: 'pc_tomorrow',
  carried: 'pc_carried', todoDone: 'pc_todo_done', streak: 'pc_streak',
  pinned: 'pc_pinned', focus: 'pc_focus', energyFilter: 'pc_ef',
};
function ls(k,d=''){try{return localStorage.getItem(k)||d;}catch(e){return d;}}
function lss(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function lsg(k,d){try{const s=localStorage.getItem(k);return s?JSON.parse(s):d;}catch(e){return d;}}
function lsSet(k){return new Set(lsg(k,[]));}
function lsSave(k,s){lss(k,[...s]);}
function lsObj(k){return lsg(k,{});}

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let activeView   = 'thisweek'; // 'thisweek'|'nextweek'|'todos'
let activeDayIdx = 0;
let thisWeekData = null;
let nextWeekData = null;
let todosData    = null;
let loading      = {thisweek:false, nextweek:false, todos:false};
let errors       = {thisweek:null, nextweek:null, todos:null};
let completedOpen = false;
let lastAction   = null;
let toastTimer   = null;

let doneSet       = lsSet(KEYS.done);

// ═══════════════════════════════════════════════════════════════
// API FETCHING
// ═══════════════════════════════════════════════════════════════
async function fetchData(type, cacheKey, tsKey, force=false) {
  const cached = ls(cacheKey);
  const ts = parseInt(ls(tsKey,'0'));
  if (!force && cached && Date.now()-ts < CACHE_TTL) {
    return JSON.parse(cached);
  }
  const r = await fetch(`${API}?type=${type}`);
  if (!r.ok) throw new Error(`API error ${r.status}`);
  const data = await r.json();
  try { localStorage.setItem(cacheKey, JSON.stringify(data)); localStorage.setItem(tsKey, Date.now().toString()); } catch(e){}
  return data;
}

async function loadThisWeek(force=false) {
  loading.thisweek=true; errors.thisweek=null; renderApp();
  try {
    thisWeekData = await fetchData('thisweek', KEYS.thisWeekCache, KEYS.thisWeekTs, force);
    // Auto-select today's day
    const tk = todayKey();
    const days = ['mon','tue','wed','thu','fri'];
    const todayNames = ['Monday','Tuesday','Wednesday','Thursday','Friday'];
    const dayNames = (thisWeekData.days||[]).map(d=>d.title.toLowerCase());
    const todayIdx = todayNames.findIndex(n=>dayNames.some(d=>d.includes(n.toLowerCase())));
    if(todayIdx>=0) activeDayIdx=todayIdx;
  } catch(e) { errors.thisweek=e.message; }
  loading.thisweek=false; renderApp();
}

async function loadNextWeek(force=false) {
  loading.nextweek=true; errors.nextweek=null; renderApp();
  try { nextWeekData = await fetchData('nextweek', KEYS.nextWeekCache, KEYS.nextWeekTs, force); }
  catch(e) { errors.nextweek=e.message; }
  loading.nextweek=false; renderApp();
}

async function loadTodos(force=false) {
  loading.todos=true; errors.todos=null; renderApp();
  try { todosData = await fetchData('todos', KEYS.todosCache, KEYS.todosTs, force); }
  catch(e) { errors.todos=e.message; }
  loading.todos=false; renderApp();
}

function refreshCurrent(){ 
  if(activeView==='thisweek') loadThisWeek(true);
  else if(activeView==='nextweek') loadNextWeek(true);
  else loadTodos(true);
}

// ═══════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════
function todayKey(){return['sun','mon','tue','wed','thu','fri','sat'][new Date().getDay()];}
function nowMin(){const d=new Date();return d.getHours()*60+d.getMinutes();}
function parseMin(str){
  if(!str)return null;
  const m=str.match(/(\d+):(\d+)\s*(AM|PM)?/i);if(!m)return null;
  let h=parseInt(m[1]),min=parseInt(m[2]);
  const mer=(m[3]||'').toUpperCase();
  if(mer==='PM'&&h<12)h+=12;if(mer==='AM'&&h===12)h=0;
  if(!mer&&h<6)h+=12;
  return h*60+min;
}
function isNow(t){const s=parseMin(t.time);if(!s)return false;return Math.abs(nowMin()-s)<=50;}

function getCheckable(day){
  return (day.sections||[]).flatMap(s=>s.tasks.filter(t=>t.checkable));
}
function getAllTasks(day){
  return (day.sections||[]).flatMap(s=>s.tasks);
}
function getDayProgress(day){
  const checkable=getCheckable(day);
  const resolved=checkable.filter(t=>doneSet.has(t.id)||tomorrowMap[t.id]).length;
  return {resolved, total:checkable.length};
}
function isDayResolved(day){const{resolved,total}=getDayProgress(day);return total>0&&resolved===total;}

function isTodayDay(day){
  if(!day)return false;
  const tk=todayKey();
  const dayNames={mon:'monday',tue:'tuesday',wed:'wednesday',thu:'thursday',fri:'friday'};
  const todayName=dayNames[tk]||'';
  return day.title.toLowerCase().includes(todayName);
}

function updateStreak(day){
  if(!isDayResolved(day))return;
  const today=new Date().toISOString().slice(0,10);
  if(streakData.lastDate===today)return;
  const yesterday=new Date(Date.now()-86400000).toISOString().slice(0,10);
  streakData.count=streakData.lastDate===yesterday?(streakData.count||0)+1:1;
  streakData.lastDate=today;
  lss(KEYS.streak,streakData);
}

function swipeDone(id,title){
  lastAction={type:'done',id};
  doneSet.add(id); postponedSet.delete(id); delete tomorrowMap[id];
  lsSave(KEYS.done,doneSet); lsSave(KEYS.postponed,postponedSet); lss(KEYS.tomorrow,tomorrowMap);
  showToast(ENCOURAGEMENTS[Math.floor(Math.random()*ENCOURAGEMENTS.length)]);
  renderApp();
  const day=getCurrentDay();
  if(day&&isDayResolved(day)){updateStreak(day);setTimeout(confetti,200);}
}
function swipePostpone(id){
  lastAction={type:'postpone',id};
  postponedSet.add(id); doneSet.delete(id); delete tomorrowMap[id];
  lsSave(KEYS.postponed,postponedSet); lsSave(KEYS.done,doneSet); lss(KEYS.tomorrow,tomorrowMap);
  showToast('⏸ Postponed'); renderApp();
}
function swipeTomorrow(id,title,fromLabel){
  lastAction={type:'tomorrow',id};
  tomorrowMap[id]={title,fromLabel}; doneSet.delete(id); postponedSet.delete(id);
  lss(KEYS.tomorrow,tomorrowMap); lsSave(KEYS.done,doneSet); lsSave(KEYS.postponed,postponedSet);
  showToast('→ Moved to tomorrow'); renderApp();
  const day=getCurrentDay();
  if(day&&isDayResolved(day)){updateStreak(day);setTimeout(confetti,200);}
}
function undoLast(){
  if(!lastAction)return;
  const a=lastAction; lastAction=null;
  if(a.type==='done'){doneSet.delete(a.id);lsSave(KEYS.done,doneSet);}
  if(a.type==='postpone'){postponedSet.delete(a.id);lsSave(KEYS.postponed,postponedSet);}
  if(a.type==='tomorrow'){delete tomorrowMap[a.id];lss(KEYS.tomorrow,tomorrowMap);}
  hideToast(); renderApp();
}
function carriedDone(id){carriedStates[id]='done';lss(KEYS.carried,carriedStates);showToast(ENCOURAGEMENTS[Math.floor(Math.random()*ENCOURAGEMENTS.length)]);renderApp();}
function carriedPostpone(id){carriedStates[id]='postponed';lss(KEYS.carried,carriedStates);showToast('⏸ Postponed');renderApp();}
function carriedTomorrow(id,title){carriedStates[id]='tomorrow';tomorrowMap[id]={title,fromLabel:'yesterday'};lss(KEYS.carried,carriedStates);lss(KEYS.tomorrow,tomorrowMap);showToast('→ Tomorrow');renderApp();}
function carriedUndo(id){delete carriedStates[id];lss(KEYS.carried,carriedStates);renderApp();}
function toggleTodoDone(id){
  if(todoDoneSet.has(id))todoDoneSet.delete(id);else todoDoneSet.add(id);
  lsSave(KEYS.todoDone,todoDoneSet); renderApp();
}
function togglePin(id){
  pinnedTaskId=pinnedTaskId===id?null:id;
  try{localStorage.setItem(KEYS.pinned,pinnedTaskId||'');}catch(e){}
  renderApp();
}
function toggleFocus(){focusMode=!focusMode;try{localStorage.setItem(KEYS.focus,focusMode?'1':'0');}catch(e){}renderApp();}
function setEnergyFilter(f){energyFilter=energyFilter===f?'all':f;try{localStorage.setItem(KEYS.energyFilter,energyFilter);}catch(e){}renderApp();}
function toggleCompleted(){completedOpen=!completedOpen;renderApp();}
function switchView(v){activeView=v;renderApp();if(v==='nextweek'&&!nextWeekData&&!loading.nextweek)loadNextWeek();if(v==='todos'&&!todosData&&!loading.todos)loadTodos();}
function switchDay(i){activeDayIdx=i;renderApp();}
function getCurrentDay(){
  const data=activeView==='thisweek'?thisWeekData:nextWeekData;
  return data?.days?.[activeDayIdx]||null;
}

// ═══════════════════════════════════════════════════════════════
// CONFETTI
// ═══════════════════════════════════════════════════════════════
function confetti(){
  const cv=document.getElementById('confetti-canvas');cv.style.display='block';
  const ctx=cv.getContext('2d');cv.width=window.innerWidth;cv.height=window.innerHeight;
  const cols=['#C8973A','#C4736A','#6A9E7E','#8B7BB5','#5B7FA6'];
  const ps=Array.from({length:70},()=>({x:Math.random()*cv.width,y:-10,r:3+Math.random()*5,d:1.5+Math.random()*2,c:cols[Math.floor(Math.random()*5)],ta:0,ts:.1+Math.random()*.15}));
  let f=0;
  function draw(){ctx.clearRect(0,0,cv.width,cv.height);ps.forEach(p=>{p.ta+=p.ts;p.y+=p.d;const t=Math.sin(p.ta)*11;ctx.beginPath();ctx.fillStyle=p.c;ctx.moveTo(p.x+t+p.r,p.y);ctx.lineTo(p.x+t,p.y+p.r*2);ctx.lineTo(p.x+t-p.r,p.y);ctx.closePath();ctx.fill();});if(++f<130)requestAnimationFrame(draw);else{ctx.clearRect(0,0,cv.width,cv.height);cv.style.display='none';}}
  draw();
}

// ═══════════════════════════════════════════════════════════════
// SWIPE
// ═══════════════════════════════════════════════════════════════
function initSwipe(el,onRight,onLeft1,onLeft2){
  let startX=0,startY=0,dx=0,dragging=false,dir=null;
  const card=el.querySelector('.task,.carried-task');if(!card)return;
  el.addEventListener('touchstart',e=>{startX=e.touches[0].clientX;startY=e.touches[0].clientY;dx=0;dragging=true;dir=null;card.style.transition='none';},{passive:true});
  el.addEventListener('touchmove',e=>{
    if(!dragging)return;
    dx=e.touches[0].clientX-startX;
    const dy=Math.abs(e.touches[0].clientY-startY);
    if(!dir){if(Math.abs(dx)>6||dy>6)dir=Math.abs(dx)>dy?'h':'v';}
    if(dir==='h'){e.preventDefault();card.style.transform=`translateX(${dx}px)`;}
  },{passive:false});
  el.addEventListener('touchend',()=>{
    if(!dragging||dir!=='h'){card.style.transition='';card.style.transform='';dragging=false;return;}
    dragging=false;card.style.transition='transform .25s ease';
    if(dx>70&&onRight){card.style.transform='translateX(110%)';setTimeout(()=>{card.style.transition='';card.style.transform='';onRight();},220);}
    else if(dx<-55){
      card.style.transform=`translateX(-${Math.min(Math.abs(dx),140)}px)`;
      if(dx<-110&&onLeft2){setTimeout(()=>{card.style.transition='';card.style.transform='';onLeft2();},220);}
      else if(onLeft1){setTimeout(()=>{card.style.transition='';card.style.transform='';onLeft1();},220);}
      else{setTimeout(()=>{card.style.transform='';},300);}
    } else{card.style.transform='';}
  });
}

// RENDER HELPERS
// ═══════════════════════════════════════════════════════════════
function renderTask(t, energy, dayLabel, isToday){
  const isDone=doneSet.has(t.id);
  const isPost=postponedSet.has(t.id)&&!isDone;
  const isTom=!!tomorrowMap[t.id]&&!isDone;
  const isResolved=isDone||isTom;
  const now=isNow(t)&&!isResolved&&isToday;
  const isPinned=pinnedTaskId===t.id;
  const isFocused=focusMode;

  let stCls='',chk='',statusLabel='';
  if(isDone){stCls='done';chk='✓';}
  if(isPost){stCls='postponed';chk='⏸';statusLabel='<div class="t-status postponed">⏸ Postponed</div>';}
  if(isTom){stCls='tomorrow-state';chk='→';statusLabel='<div class="t-status tomorrow">→ Moved to tomorrow</div>';}

  return `
    ${now?'<div class="now-pill"><div class="now-dot"></div>Happening now</div>':''}
    <div class="swipe-wrap energy-${energy}" id="sw-${t.id}">
      <div class="swipe-bg-left">✓ Done</div>
      <div class="swipe-bg-right">
        <button class="swipe-action-btn" onclick="swipePostpone('${t.id}')">⏸ Later</button>
        <button class="swipe-action-btn" onclick="swipeTomorrow('${t.id}','${t.title.replace(/'/g,"\\'")}','${dayLabel}')">→ Tomorrow</button>
      </div>
      <div class="task ${energy} ${stCls}">
        <div class="chk">${chk}</div>
        <div class="t-body">
          ${t.time?`<div class="t-time">${t.time}</div>`:''}
          <div class="t-title">${t.title}</div>
          ${t.note&&!t.firstStep?`<div class="t-note">${t.note}</div>`:''}
          ${t.firstStep&&t.urgent&&!isResolved?`<div class="t-first-step">${t.firstStep}</div>`:''}
          ${statusLabel}
        </div>
        ${t.urgent&&!isResolved&&!isPost?'<span class="badge">Urgent</span>':''}
        <button class="pin-btn${isPinned?' pinned':''}" onclick="event.stopPropagation();togglePin('${t.id}')" title="${isPinned?'Unpin':'Pin as focus'}">📌</button>
      </div>
    </div>`;
}

function renderEventTask(t, energy){
  return `
    <div class="event-wrap energy-${energy}">
      <div class="task ${energy} event">
        <div class="evt-dot"></div>
        <div class="t-body">
          ${t.time?`<div class="t-time">${t.time}</div>`:''}
          <div class="t-title">${t.title}</div>
          ${t.note?`<div class="t-note">${t.note}</div>`:''}
        </div>
      </div>
    </div>`;
}

function renderDayPlan(day, isToday){
  if(!day) return '<div class="no-plan-msg"><div class="emoji">🗓️</div><h3>No plan yet</h3><p>Ask Claude to build this day\'s plan and it\'ll appear here automatically!</p></div>';
  if(!day.hasplan) return `<div class="no-plan-msg"><div class="emoji">🗓️</div><h3>No plan yet for ${day.title}</h3><p>Ask Claude to build this day\'s plan and it\'ll appear here automatically!</p></div>`;

  const {resolved, total} = getDayProgress(day);
  const resolved100 = total>0&&resolved===total;
  const ec={peak:'#C8973A',decent:'#6A9E7E',crash:'#8B7BB5',fixed:'#5B7FA6'};

  // Find focus task
  let focusTaskId=null;
  if(focusMode){
    if(pinnedTaskId&&getAllTasks(day).find(t=>t.id===pinnedTaskId)) focusTaskId=pinnedTaskId;
    else{
      const all=getCheckable(day);
      const first=all.find(t=>!doneSet.has(t.id)&&!tomorrowMap[t.id]&&t.urgent)||all.find(t=>!doneSet.has(t.id)&&!tomorrowMap[t.id]);
      if(first) focusTaskId=first.id;
    }
  }

  // Carried tasks for today
  const carried=Object.entries(tomorrowMap).filter(([id,info])=>isToday&&info.fromLabel).map(([id,info])=>({id,...info}));

  let html='';
  if(day.deadline) html+=`<div class="deadline">${day.deadline}</div>`;
  if(resolved100) html+=`<div class="all-done-banner"><div class="em">🎉</div><h3>All tasks completed or reassigned</h3><p>Nothing outstanding. Nice work!</p></div>`;
  if(focusMode){
    const pinned=pinnedTaskId?getAllTasks(day).find(t=>t.id===pinnedTaskId):null;
    html+=`<div class="focus-banner"><div>🎯</div><div class="focus-banner-text"><strong>Focus Mode</strong><br><span class="focus-hint">${pinned?`Pinned: ${pinned.title}`:'Showing your first urgent task. Tap 📌 to pin any task.'}</span></div></div>`;
  }
  if(carried.length>0){
    html+=`<div class="tray-banner"><div class="tray-title">📬 Carried Over</div>`;
    carried.forEach(item=>{
      const cs=carriedStates[item.id];
      let stCls='',chk='',statusLabel='';
      if(cs==='done'){stCls='done';chk='✓';}
      if(cs==='postponed'){stCls='postponed-s';chk='⏸';statusLabel='<div class="t-status postponed">⏸ Postponed</div>';}
      if(cs==='tomorrow'){stCls='tomorrow-s';chk='→';statusLabel='<div class="t-status tomorrow">→ Tomorrow again</div>';}
      html+=`<div class="carried-wrap" id="cw-${item.id}">
        <div class="carried-bg-left">✓ Done</div>
        <div class="carried-bg-right">
          <button class="swipe-action-btn" onclick="carriedPostpone('${item.id}')">⏸ Later</button>
          <button class="swipe-action-btn" onclick="carriedTomorrow('${item.id}','${item.title.replace(/'/g,"\\'")}')">→ Tomorrow</button>
        </div>
        <div class="carried-task ${stCls}">
          <div class="carried-chk">${chk}</div>
          <div class="t-body">
            <div class="carried-from">From ${item.fromLabel||'yesterday'}</div>
            <div class="t-title">${item.title}</div>
            ${statusLabel}
          </div>
          ${cs?`<button style="background:none;border:none;font-size:11px;color:var(--muted);cursor:pointer;" onclick="carriedUndo('${item.id}')">↩</button>`:''}
        </div>
      </div>`;
    });
    html+=`</div>`;
  }

  html+=`<div class="energy-bar" id="ebar">
    <button class="ef-btn${energyFilter==='all'?' active-all':''}" onclick="setEnergyFilter('all')">All times</button>
    <button class="ef-btn${energyFilter==='peak'?' active-peak':''}" onclick="setEnergyFilter('peak')">💪 Peak</button>
    <button class="ef-btn${energyFilter==='decent'?' active-decent':''}" onclick="setEnergyFilter('decent')">🌤 Decent</button>
    <button class="ef-btn${energyFilter==='crash'?' active-crash':''}" onclick="setEnergyFilter('crash')">😴 Crash</button>
  </div>
  <div class="legend">
    <div class="li"><div class="ld" style="background:${ec.peak}"></div>Peak</div>
    <div class="li"><div class="ld" style="background:${ec.decent}"></div>Decent</div>
    <div class="li"><div class="ld" style="background:${ec.crash}"></div>Crash</div>
    <div class="li"><div class="ld" style="background:${ec.fixed}"></div>Fixed</div>
  </div>`;

  (day.sections||[]).forEach(sec=>{
    const hasFocus=focusMode&&sec.tasks.some(t=>t.id===focusTaskId);
    html+=`<div class="section${hasFocus?' has-focus-task':''}"><div class="sec-title">${sec.title}</div>`;
    sec.tasks.forEach(t=>{
      const isFocusTarget=!focusMode||(t.id===focusTaskId);
      if(t.checkable){
        html+=`<div class="${focusMode&&!isFocusTarget?'swipe-wrap energy-'+sec.energy+' not-focus':''}">`;
        if(!focusMode||isFocusTarget) html+=renderTask(t, sec.energy, day.title, isToday);
        else html+=`</div>`;
        if(!focusMode||isFocusTarget) html+=`</div>`;
      } else {
        html+=renderEventTask(t, sec.energy);
      }
    });
    html+=`</div>`;
  });
  return html;
}

// ═══════════════════════════════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════════════════════════════
function renderApp(){
  document.body.classList.toggle('focus-mode', focusMode&&activeView!=='todos');
  ['peak','decent','crash','all'].forEach(e=>document.body.classList.remove('filter-'+e));
  if(energyFilter!=='all') document.body.classList.add('filter-'+energyFilter);

  const isWeekView = activeView==='thisweek'||activeView==='nextweek';
  const weekData = activeView==='thisweek'?thisWeekData:nextWeekData;
  const isLoading = activeView==='thisweek'?loading.thisweek:activeView==='nextweek'?loading.nextweek:loading.todos;
  const error = activeView==='thisweek'?errors.thisweek:activeView==='nextweek'?errors.nextweek:errors.todos;

  const currentDay = isWeekView&&weekData ? weekData.days?.[activeDayIdx] : null;
  const isToday = currentDay ? isTodayDay(currentDay) : false;
  const {resolved,total} = currentDay ? getDayProgress(currentDay) : {resolved:0,total:0};
  const pct = total>0?Math.round(resolved/total*100):0;
  const resolved100 = total>0&&resolved===total;
  const streakCount = streakData.count||0;

  // Header content
  let eyebrow='', htitle='', hsub='', showProgress=false;
  if(activeView==='thisweek'){
    eyebrow='This Week'; htitle=currentDay?currentDay.title:'This Week\'s Plan';
    hsub=resolved100?'All tasks resolved 🎉':`${resolved} of ${total} to-dos done`;
    showProgress=!!currentDay&&total>0;
  } else if(activeView==='nextweek'){
    eyebrow='Next Week'; htitle=currentDay?currentDay.title:'Next Week\'s Plan';
    hsub=resolved100?'All tasks resolved 🎉':`${resolved} of ${total} to-dos done`;
    showProgress=!!currentDay&&total>0;
  } else {
    eyebrow='Full To-Do List'; htitle='All Tasks';
    hsub=todosData?`${Object.values(todosData).flat().filter(t=>!todoDoneSet.has(t.id)&&!t.done).length} tasks remaining`:'Loading...';
  }

  // Day tabs for week views
  let dayTabsHtml='';
  if(isWeekView&&weekData?.days){
    dayTabsHtml=weekData.days.map((d,i)=>{
      const isActive=i===activeDayIdx;
      const isTd=isTodayDay(d);
      let cls='tab';
      if(isActive) cls+=' active';
      if(isTd&&!isActive) cls+=' today-tab';
      if(!d.hasplan) cls+=' no-plan';
      const shortName=d.title.replace(/,.*$/,'').replace(/\s+\w+$/,'').trim().slice(0,3);
      return `<div class="${cls}" onclick="switchDay(${i})">${shortName}${isTd?'<span style="margin-left:3px;font-size:8px">●</span>':''}</div>`;
    }).join('');
  }

  const topTabsHtml=`
    <div class="tab${activeView==='thisweek'?' active':''}" onclick="switchView('thisweek')">This Week</div>
    <div class="tab next-week-tab${activeView==='nextweek'?' active':''}" onclick="switchView('nextweek')">Next Week</div>
    <div class="tab list-tab${activeView==='todos'?' active':''}" onclick="switchView('todos')">📋 All Tasks</div>
  `;

  let html=`
    <div class="header">
      <div class="eyebrow">${eyebrow}</div>
      <div class="h-title">${htitle}</div>
      <div class="h-sub">${hsub}</div>
      ${showProgress?'<div class="h-sub-note">Events & anchors not counted</div>':''}
      ${showProgress?`<div class="prog-wrap"><div class="prog-fill" style="width:${pct}%"></div></div><div class="prog-lbl">${resolved100?'All completed or reassigned ✓':pct+'% complete'}</div>`:''}
      ${isWeekView?`<div class="header-controls">
        <button class="hc-btn${focusMode?' focus-active':''}" onclick="toggleFocus()">${focusMode?'✕ Exit Focus':'🎯 Focus Mode'}</button>
        <button class="hc-btn${energyFilter!=='all'?' active':''}" onclick="document.getElementById('ebar')?.scrollIntoView({behavior:'smooth'})">⚡ Energy Filter</button>
        ${streakCount>=2?`<span class="hc-btn streak">🔥 ${streakCount} day streak</span>`:''}
      </div>`:''}
    </div>
    <div class="tabs-wrap">
      <div class="tabs">
        ${topTabsHtml}
        ${dayTabsHtml?`<span style="width:1px;background:rgba(255,255,255,.1);margin:0 2px;display:inline-block;height:20px;align-self:center;"></span>${dayTabsHtml}`:''}
      </div>
    </div>`;

  // Body
  if(isLoading){
    html+=`<div class="loading"><div class="spinner"></div><div class="loading-lbl">Fetching from Notion…</div></div>`;
  } else if(error){
    html+=`<div class="error-box"><p>Couldn't load from Notion.<br><small>${error}</small></p><button class="retry-btn" onclick="refreshCurrent()">Try again</button></div>`;
  } else if(activeView==='todos'){
    if(!todosData){
      html+=`<div class="loading"><div class="spinner"></div><div class="loading-lbl">Loading tasks…</div></div>`;
    } else {
      const cats=[
        {key:'urgent',label:'🚨 Urgent',cls:'cat-urgent',items:todosData.urgent||[]},
        {key:'work',label:'💼 Work Tasks',cls:'cat-work',items:todosData.work||[]},
        {key:'personal',label:'🌿 Personal',cls:'cat-personal',items:todosData.personal||[]},
      ];
      html+=`<div class="list-header"><span style="opacity:.45;font-size:13px">●</span> Dimmed = already on this week's plan</div>`;
      let allCompleted=[], delay=0;
      cats.forEach(cat=>{
        const active=cat.items.filter(i=>!i.done&&!todoDoneSet.has(i.id));
        const completed=cat.items.filter(i=>i.done||todoDoneSet.has(i.id));
        allCompleted=allCompleted.concat(completed.map(i=>({...i,catCls:cat.cls,catKey:cat.key})));
        html+=`<div class="list-section"><div class="list-sec-title">${cat.label}</div>`;
        if(active.length===0) html+=`<div style="padding:8px 0 4px;font-size:12.5px;color:var(--muted);font-style:italic;">All done ✓</div>`;
        active.forEach(item=>{
          const isScheduled=!!item.scheduledOn;
          const dayLabel=item.scheduledOn?(weekData?.days||[]).find(d=>d.title.toLowerCase().includes(item.scheduledOn))?.title||item.scheduledOn:null;
          delay+=20;
          html+=`<div class="todo-item${isScheduled?' scheduled':''}" style="animation-delay:${delay}ms" onclick="toggleTodoDone('${item.id}')">
            <div class="todo-chk">${todoDoneSet.has(item.id)?'✓':''}</div>
            <div class="todo-body">
              <div class="todo-title">${item.title}</div>
              <div class="todo-meta">
                <span class="todo-cat ${cat.cls}">${cat.key}</span>
                ${isScheduled?`<span class="sched-tag">📅 ${dayLabel||item.scheduledOn}</span>`:''}
              </div>
            </div>
          </div>`;
        });
        html+=`</div>`;
      });
      html+=`<div class="completed-toggle" onclick="toggleCompleted()">
        <span class="completed-toggle-label">Completed tasks</span>
        <span class="completed-toggle-count">${allCompleted.length}</span>
        <span class="completed-toggle-arrow${completedOpen?' open':''}">▼</span>
      </div>
      <div class="completed-section${completedOpen?' open':''}">`;
      allCompleted.forEach(item=>{
        html+=`<div class="completed-item" onclick="toggleTodoDone('${item.id}')"><div class="completed-chk">✓</div><div class="todo-title">${item.title}</div></div>`;
      });
      html+=`</div>`;
    }
  } else {
    // Week plan view
    if(!weekData){
      html+=`<div class="loading"><div class="spinner"></div><div class="loading-lbl">Fetching your plan…</div></div>`;
    } else if(!weekData.days||weekData.days.length===0){
      html+=`<div class="no-plan-msg"><div class="emoji">📭</div><h3>No plan found</h3><p>Ask Claude to build your week's plan and it'll appear here automatically!</p></div>`;
    } else {
      html+=renderDayPlan(currentDay, isToday);
    }
  }

  html+=`<button class="refresh-btn" onclick="refreshCurrent()">↻ Refresh from Notion</button>`;
  html+=`<div class="footer">Swipe right = done · Swipe left = later / tomorrow<br><span style="opacity:.55">Auto-synced from Notion via Claude</span></div>`;

  document.getElementById('root').innerHTML=html;

  // Init swipe handlers
  if(currentDay){
    getAllTasks(currentDay).filter(t=>t.checkable).forEach(t=>{
      const wrap=document.getElementById('sw-'+t.id);
      if(wrap) initSwipe(wrap, ()=>swipeDone(t.id,t.title), ()=>swipePostpone(t.id), ()=>swipeTomorrow(t.id,t.title,currentDay.title));
    });
    Object.entries(tomorrowMap).forEach(([id,info])=>{
      const wrap=document.getElementById('cw-'+id);
      if(wrap) initSwipe(wrap, ()=>carriedDone(id), ()=>carriedPostpone(id), ()=>carriedTomorrow(id,info.title));
    });
  }
}

// ═══════════════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════════════
renderApp();
loadThisWeek();
</script>
</body>
</html>
